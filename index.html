
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 تقرير السوق اللحظي</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1117;
    --surface2: #161b22;
    --surface3: #1c2330;
    --border: #21262d;
    --border-glow: #30d158;
    --green: #30d158;
    --green-dim: #1a4d2e;
    --red: #ff453a;
    --red-dim: #4d1a18;
    --gold: #ffd60a;
    --gold-dim: #3d3000;
    --blue: #0a84ff;
    --blue-dim: #00254d;
    --text: #e6edf3;
    --text-dim: #7d8590;
    --text-muted: #484f58;
    --mono: 'IBM Plex Mono', monospace;
    --arabic: 'Tajawal', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--arabic);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  .noise {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    position: relative;
    z-index: 1;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    letter-spacing: 3px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(48,209,88,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(48,209,88,0); }
  }

  .header-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .api-section {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    transition: border-color 0.3s;
  }

  .api-section:focus-within {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(10,132,255,0.1);
  }

  .api-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .api-input-row {
    display: flex;
    gap: 10px;
  }

  .api-input {
    flex: 1;
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    direction: ltr;
  }

  .api-input:focus { border-color: var(--blue); }
  .api-input::placeholder { color: var(--text-muted); }

  .save-btn {
    background: var(--blue-dim);
    border: 1px solid var(--blue);
    color: var(--blue);
    padding: 11px 18px;
    border-radius: 8px;
    font-family: var(--arabic);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .save-btn:hover { background: var(--blue); color: #fff; }

  .api-status {
    font-size: 11px;
    font-family: var(--mono);
    margin-top: 8px;
    height: 16px;
  }

  .api-status.ok { color: var(--green); }
  .api-status.err { color: var(--red); }

  .gen-btn {
    width: 100%;
    background: linear-gradient(135deg, #0a1f0e 0%, #0d2b15 100%);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 16px;
    border-radius: 12px;
    font-family: var(--arabic);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }

  .gen-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(48,209,88,0.08), transparent);
    transition: left 0.5s;
  }

  .gen-btn:hover::before { left: 100%; }

  .gen-btn:hover {
    background: linear-gradient(135deg, #0d2b15 0%, #122f1a 100%);
    box-shadow: 0 0 20px rgba(48,209,88,0.2);
  }

  .gen-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    border-color: var(--text-muted);
    color: var(--text-muted);
  }

  .gen-btn:disabled::before { display: none; }

  .loading { display: none; text-align: center; padding: 48px 0; }
  .loading.show { display: block; }

  .loading-ring {
    width: 48px; height: 48px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 2px;
    animation: blink 1.5s infinite;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .report-output { display: none; animation: fadeIn 0.5s ease; }
  .report-output.show { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .summary-strip {
    background: linear-gradient(135deg, var(--green-dim), transparent);
    border: 1px solid var(--green);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 20px;
    font-size: 14px;
    line-height: 1.8;
  }

  .summary-strip .line { color: var(--text); }
  .summary-strip .line strong { color: var(--green); }

  .divider {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    letter-spacing: 2px;
    padding: 12px 0;
    margin-bottom: 4px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .report-title-block {
    background: var(--surface2);
    border-radius: 12px;
    padding: 20px 24px;
    margin: 16px 0;
    text-align: center;
  }

  .report-main-title { font-size: 22px; font-weight: 900; margin-bottom: 8px; }

  .report-meta {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
  }

  .section-header {
    padding: 13px 20px;
    background: var(--surface2);
    font-size: 15px;
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-body {
    padding: 16px 20px;
    font-size: 14px;
    line-height: 2;
    color: #c9d1d9;
  }

  .section-body ul { list-style: none; padding: 0; }

  .section-body ul li {
    padding: 3px 0;
    padding-right: 16px;
    position: relative;
  }

  .section-body ul li::before {
    content: '›';
    position: absolute;
    right: 0;
    color: var(--text-muted);
  }

  .trades-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    direction: rtl;
  }

  .trades-table th {
    background: var(--surface3);
    padding: 10px 12px;
    text-align: right;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  .trades-table td {
    padding: 11px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .trades-table tr:last-child td { border-bottom: none; }
  .trades-table tr:hover td { background: rgba(255,255,255,0.02); }

  .badge {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .badge-call { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }
  .badge-put { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
  .badge-high { background: var(--gold-dim); color: var(--gold); }
  .badge-med { background: var(--blue-dim); color: var(--blue); }
  .badge-low { background: var(--surface3); color: var(--text-dim); }

  .asset-chip { font-family: var(--mono); font-weight: 600; font-size: 13px; color: var(--text); }

  .zubda-grid { display: grid; gap: 10px; }

  .zubda-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 13.5px;
    line-height: 1.7;
  }

  .zubda-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }

  .zubda-label {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    display: block;
    margin-bottom: 2px;
    letter-spacing: 1px;
  }

  .quick-lines {
    background: var(--surface3);
    border-radius: 8px;
    padding: 12px 16px;
    margin-top: 10px;
  }

  .quick-line {
    font-family: var(--mono);
    font-size: 13px;
    padding: 4px 0;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .quick-line:last-child { border-bottom: none; }
  .quick-line .conf { margin-right: auto; font-weight: 700; }
  .conf-high { color: var(--green); }
  .conf-med { color: var(--gold); }

  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 18px;
    border-radius: 8px;
    font-family: var(--arabic);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 20px 0 0 auto;
  }

  .copy-btn:hover { border-color: var(--gold); color: var(--gold); }

  .error-box {
    background: var(--red-dim);
    border: 1px solid var(--red);
    border-radius: 10px;
    padding: 16px 20px;
    color: var(--red);
    font-size: 14px;
    display: none;
  }

  .error-box.show { display: block; }

  .footer {
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 40px;
    letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    .trades-table { font-size: 11px; }
    .trades-table th, .trades-table td { padding: 8px 6px; }
    .report-meta { flex-direction: column; gap: 4px; }
  }
</style>
</head>
<body>
<div class="noise"></div>

<div class="container">

  <div class="header">
    <div class="logo">LIVE · MARKET</div>
    <div class="header-title">📊 تقرير السوق اللحظي</div>
  </div>

  <div class="api-section">
    <div class="api-label">🔑 مفتاح Anthropic API</div>
    <div class="api-input-row">
      <input type="password" class="api-input" id="apiKey" placeholder="sk-ant-api03-..." />
      <button class="save-btn" onclick="saveKey()">حفظ</button>
    </div>
    <div class="api-status" id="apiStatus"></div>
  </div>

  <button class="gen-btn" id="genBtn" onclick="generateReport()">
    <span id="btnIcon">⚡</span>
    <span id="btnText">توليد التقرير اللحظي</span>
  </button>

  <div class="error-box" id="errorBox"></div>

  <div class="loading" id="loading">
    <div class="loading-ring"></div>
    <div class="loading-text">ANALYZING MARKET DATA...</div>
  </div>

  <div class="report-output" id="reportOutput"></div>

  <div class="footer">
    MARKET INTELLIGENCE SYSTEM · FOR EDUCATIONAL PURPOSES ONLY
  </div>
</div>

<script>
let apiKey = localStorage.getItem('anthropic_api_key') || '';

window.onload = () => {
  if (apiKey) {
    document.getElementById('apiKey').value = apiKey;
    setStatus('✓ المفتاح محفوظ', 'ok');
  }
};

function saveKey() {
  const val = document.getElementById('apiKey').value.trim();
  if (!val.startsWith('sk-ant')) {
    setStatus('✗ مفتاح غير صالح — يجب أن يبدأ بـ sk-ant', 'err');
    return;
  }
  apiKey = val;
  localStorage.setItem('anthropic_api_key', apiKey);
  setStatus('✓ تم الحفظ بنجاح', 'ok');
}

function setStatus(msg, type) {
  const el = document.getElementById('apiStatus');
  el.textContent = msg;
  el.className = 'api-status ' + type;
}

function getNYTime() {
  const now = new Date();
  return now.toLocaleString('en-US', { timeZone: 'America/New_York', hour12: true,
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
    hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function getArabicDate() {
  const now = new Date();
  return now.toLocaleDateString('ar-SA', { timeZone: 'America/New_York',
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function buildPrompt() {
  const nyTime = getNYTime();
  const arDate = getArabicDate();
  return `أنت محلل سوق مالي محترف متخصص في الأسواق الأمريكية وتداول الأوبشن.
الوقت الحالي بتوقيت نيويورك: ${nyTime}
التاريخ بالعربي: ${arDate}

نفّذ التقرير النهائي فقط، ولا تشرح طريقتك.

التزم بالقالب التالي حرفيًا:
- ابدأ بسطرين قصيرين جدًا:
  1) ملخص اتجاه السوق الآن
  2) أفضل توجه تداول الآن
- ثم سطر فارغ
- ثم:
━━━━━━━━━━━━
🇺🇸 **تقرير السوق اللحظي**
📅 ${arDate}
⏱️ **${nyTime} (New York)**
━━━━━━━━━━━━

ثم بالترتيب فقط:
## 🧭 الحالة
## 📰 المحركات
## 📈 فنيًا
## 🎯 أفضل 5 صفقات
## ⚡ الزبدة التنفيذية

التزم بهذه القواعد:
- أسلوب احترافي فاخر هادئ
- مختصر جدًا
- مناسب للنشر في تيليجرام
- إيموجي أنيقة وخفيفة
- لا مقدمات طويلة
- لا فقرات طويلة
- لا خاتمة
- لا خروج عن القالب
- لا أقسام إضافية
- لا تكرار
- لا شرح نظري

حلّل السوق بناءً على:
- التحليل المالي
- البيانات الاقتصادية
- التحليل الفني
- الأخبار السياسية والجيوسياسية
- معنويات السوق
- المحركات الحالية

رشّح أفضل 5 صفقات أوبشن فقط على:
QQQ, SPY, NVDA, TSLA
ويمكن إضافة: AAPL, META, MSFT, AMD

شروط الصفقات:
- Call أو Put
- 0DTE أو 1DTE أو 2DTE أو 3DTE فقط
- رتّب من 1 إلى 5
- لا ترشح إلا الفرص القوية والواضحة
- إذا الصورة غير واضحة، قل ذلك صراحة

صياغة الأقسام:
- "الحالة": سطران فقط
- "المحركات": 3 إلى 4 نقاط قصيرة جدًا
- "فنيًا": 4 نقاط فقط
- "أفضل 5 صفقات": جدول بهذه الأعمدة فقط:
| # | الأصل | الاتجاه | المدة | الثقة | السبب | الطابع | النوع |
- "الزبدة التنفيذية": يجب أن تحتوي فقط على:
🏆 الأفضل الآن
🛡️ البديل المحافظ
🧯 أفضل تحوط
✅ الدخول المثالي
❌ إلغاء الفكرة
⚠️ الخطر اليوم
⚡ النسخة السريعة الجاهزة

في "النسخة السريعة الجاهزة" اكتب فقط 3 أسطر بهذه الصيغة:
• [الأصل] — [Call/Put] — [المدة] — **[الثقة]**

إذا كانت بعض البيانات متأخرة أو غير متزامنة، اذكر ذلك بسطر واحد قصير جدًا فقط.
أي خروج عن هذا الشكل يعتبر خطأ.

قدّم الآن التحليل الكامل.`;
}

async function generateReport() {
  if (!apiKey) {
    document.getElementById('errorBox').textContent = '⚠️ أدخل مفتاح API أولاً وانقر "حفظ"';
    document.getElementById('errorBox').classList.add('show');
    return;
  }

  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('reportOutput').classList.remove('show');
  document.getElementById('loading').classList.add('show');
  document.getElementById('genBtn').disabled = true;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-opus-4-5',
        max_tokens: 2000,
        messages: [{ role: 'user', content: buildPrompt() }]
      })
    });

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const text = data.content[0]?.text || '';
    renderReport(text);

  } catch (err) {
    document.getElementById('errorBox').textContent = '✗ خطأ: ' + err.message;
    document.getElementById('errorBox').classList.add('show');
  } finally {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('genBtn').disabled = false;
  }
}

function renderReport(raw) {
  const output = document.getElementById('reportOutput');

  const summaryMatch = raw.match(/^(.*?)\n(.*?)\n\n━/s);
  const summary1 = summaryMatch ? summaryMatch[1].trim() : '';
  const summary2 = summaryMatch ? summaryMatch[2].trim() : '';

  const titleBlock = raw.match(/🇺🇸.*?━━━━━━━━━━━━/s)?.[0] || '';
  const dateMatch = titleBlock.match(/📅\s*(.*)/);
  const timeMatch = titleBlock.match(/⏱️\s*\**(.*?)\**/);

  const sections = {
    hala: extractSection(raw, '🧭 الحالة', '📰'),
    moharrakat: extractSection(raw, '📰 المحركات', '📈'),
    fanni: extractSection(raw, '📈 فنيًا', '🎯'),
    trades: extractSection(raw, '🎯 أفضل 5 صفقات', '⚡'),
    zubda: extractSection(raw, '⚡ الزبدة التنفيذية', null)
  };

  let html = '';

  if (summary1 || summary2) {
    html += `<div class="summary-strip">
      ${summary1 ? `<div class="line">📌 ${escH(summary1)}</div>` : ''}
      ${summary2 ? `<div class="line">🎯 <strong>${escH(summary2)}</strong></div>` : ''}
    </div>`;
  }

  html += `<div class="divider">━━━━━━━━━━━━━━━━━━━━━━━━━━━</div>
  <div class="report-title-block">
    <div class="report-main-title">🇺🇸 تقرير السوق اللحظي</div>
    <div class="report-meta">
      ${dateMatch ? `<span>📅 ${escH(dateMatch[1].trim())}</span>` : ''}
      ${timeMatch ? `<span>⏱️ ${escH(timeMatch[1].trim())}</span>` : ''}
    </div>
  </div>
  <div class="divider">━━━━━━━━━━━━━━━━━━━━━━━━━━━</div>`;

  if (sections.hala) html += renderSection('🧭 الحالة', formatBullets(sections.hala));
  if (sections.moharrakat) html += renderSection('📰 المحركات', formatBullets(sections.moharrakat));
  if (sections.fanni) html += renderSection('📈 فنيًا', formatBullets(sections.fanni));
  if (sections.trades) html += renderSection('🎯 أفضل 5 صفقات', renderTradesTable(sections.trades));
  if (sections.zubda) html += renderSection('⚡ الزبدة التنفيذية', renderZubda(sections.zubda));

  html += `<button class="copy-btn" onclick="copyTelegram()">📋 نسخ للتيليجرام</button>`;

  output.innerHTML = html;
  output.classList.add('show');
  output.dataset.raw = raw;
}

function extractSection(text, startTitle, nextTitle) {
  const startIdx = text.indexOf('## ' + startTitle);
  if (startIdx === -1) return '';
  const start = startIdx + ('## ' + startTitle).length;
  const endIdx = nextTitle ? text.indexOf('## ' + nextTitle, start) : -1;
  return endIdx === -1 ? text.slice(start).trim() : text.slice(start, endIdx).trim();
}

function escH(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderSection(title, bodyHtml) {
  return `<div class="section">
    <div class="section-header">${title}</div>
    <div class="section-body">${bodyHtml}</div>
  </div>`;
}

function formatBullets(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const items = lines.map(l => {
    const clean = l.replace(/^[-•·*]\s*/, '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    return `<li>${clean}</li>`;
  }).join('');
  return `<ul>${items}</ul>`;
}

function renderTradesTable(text) {
  const lines = text.split('\n').filter(l => l.includes('|') && !l.match(/^[\s|:-]+$/));
  if (lines.length < 2) return `<pre style="font-size:12px;color:var(--text-dim)">${escH(text)}</pre>`;

  const dataRows = lines.slice(1);
  let tableHtml = `<div style="overflow-x:auto"><table class="trades-table">
    <thead><tr>
      <th>#</th><th>الأصل</th><th>الاتجاه</th><th>المدة</th>
      <th>الثقة</th><th>السبب</th><th>الطابع</th><th>النوع</th>
    </tr></thead><tbody>`;

  dataRows.forEach(row => {
    const cells = row.split('|').map(c => c.trim()).filter(c => c);
    if (cells.length < 2) return;
    const [num, asset, dir, duration, conf, reason, char_, type_] = cells;
    const dirClass = dir?.toLowerCase().includes('call') ? 'call' : 'put';
    let confClass = 'low';
    if (conf?.includes('عالي') || conf?.includes('قوي') || conf?.includes('⭐⭐⭐')) confClass = 'high';
    else if (conf?.includes('متوسط') || conf?.includes('⭐⭐')) confClass = 'med';

    tableHtml += `<tr>
      <td><span style="font-family:var(--mono);color:var(--text-dim)">${escH(num||'')}</span></td>
      <td><span class="asset-chip">${escH(asset||'')}</span></td>
      <td><span class="badge badge-${dirClass}">${escH(dir||'')}</span></td>
      <td><span style="font-family:var(--mono);font-size:12px">${escH(duration||'')}</span></td>
      <td><span class="badge badge-${confClass}">${escH(conf||'')}</span></td>
      <td style="max-width:160px">${escH(reason||'')}</td>
      <td>${escH(char_||'')}</td>
      <td>${escH(type_||'')}</td>
    </tr>`;
  });

  tableHtml += `</tbody></table></div>`;
  return tableHtml;
}

function renderZubda(text) {
  const icons = {
    '🏆': 'الأفضل الآن',
    '🛡️': 'البديل المحافظ',
    '🧯': 'أفضل تحوط',
    '✅': 'الدخول المثالي',
    '❌': 'إلغاء الفكرة',
    '⚠️': 'الخطر اليوم',
    '⚡': 'النسخة السريعة الجاهزة'
  };

  const quickIdx = text.lastIndexOf('⚡');
  const beforeQuick = quickIdx > -1 ? text.slice(0, quickIdx) : text;
  const afterQuick = quickIdx > -1 ? text.slice(quickIdx) : '';

  let html = '<div class="zubda-grid">';

  const lines = beforeQuick.split('\n').filter(l => l.trim());
  lines.forEach(line => {
    const iconMatch = Object.keys(icons).find(ic => line.includes(ic));
    if (iconMatch) {
      const content = line.replace(iconMatch, '').replace(/^[\s:—-]+/, '').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html += `<div class="zubda-item">
        <span class="zubda-icon">${iconMatch}</span>
        <div>
          <span class="zubda-label">${icons[iconMatch]}</span>
          ${content}
        </div>
      </div>`;
    }
  });

  if (afterQuick) {
    const quickLines = afterQuick.split('\n').filter(l => l.includes('•') || l.includes('—'));
    if (quickLines.length) {
      html += `<div class="zubda-item">
        <span class="zubda-icon">⚡</span>
        <div style="width:100%">
          <span class="zubda-label">النسخة السريعة الجاهزة</span>
          <div class="quick-lines">`;
      quickLines.forEach(ql => {
        const parts = ql.replace(/•/, '').trim().split('—').map(p => p.trim());
        const confRaw = parts[3] || '';
        const confClass = confRaw.includes('عالي') || confRaw.includes('قوي') ? 'conf-high' : 'conf-med';
        html += `<div class="quick-line">
          <span style="color:var(--gold);font-weight:600">${escH(parts[0]||'')}</span>
          ${parts[1] ? `<span style="color:${parts[1]?.toLowerCase().includes('call')?'var(--green)':'var(--red)'}">— ${escH(parts[1])}</span>` : ''}
          ${parts[2] ? `<span style="color:var(--text-dim)">— ${escH(parts[2])}</span>` : ''}
          ${parts[3] ? `<span class="conf ${confClass}">— ${escH(parts[3].replace(/\*/g,''))}</span>` : ''}
        </div>`;
      });
      html += `</div></div></div>`;
    }
  }

  html += '</div>';
  return html;
}

function copyTelegram() {
  const raw = document.getElementById('reportOutput').dataset.raw || '';
  navigator.clipboard.writeText(raw).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ تم النسخ!';
    btn.style.borderColor = 'var(--green)';
    btn.style.color = 'var(--green)';
    setTimeout(() => {
      btn.innerHTML = '📋 نسخ للتيليجرام';
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 2000);
  });
}
</script>
</body>
</html>
